<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TCL | SUNPOWER Products</title>
</head>
<body>
  <script>
    (async function () {
      const parts = [
        'parts/products-tab.part.00',
        'parts/products-tab.part.01',
        'parts/products-tab.part.02',
        'parts/products-tab.part.03'
      ];
      const html = (await Promise.all(parts.map((path) => fetch(path).then((res) => res.text())))).join('');
      document.open();
      document.write(html);
      document.close();
    }());
  </script>
</body>
</html>
